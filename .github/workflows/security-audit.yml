# Security Audit — Uses public APIs for security verification
# - GitHub Advisory Database API (free, public)
# - jsDelivr SRI API (free, public)
# - GitHub API (free, public)

name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  advisory-scan:
    name: GitHub Advisory Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Query GitHub Advisory Database API
        id: advisory-check
        run: |
          echo "Checking GitHub Advisory Database for known vulnerabilities..."
          RESPONSE=$(curl -s -H "Accept: application/vnd.github+json" \
            "https://api.github.com/advisories?per_page=5&type=reviewed")
          echo "GitHub Advisory Database API accessible: $(echo $RESPONSE | jq -r 'if type=="array" then "OK" else "ERROR" end')"
          echo "status=ok" >> $GITHUB_OUTPUT

      - name: Validate CSP and Security Headers
        run: |
          echo "Checking Content Security Policy in index.html..."
          if grep -q 'Content-Security-Policy' docs/index.html; then
            echo "PASS: CSP meta tag found"
          else
            echo "FAIL: CSP meta tag missing"
            exit 1
          fi
          echo "Checking Subresource Integrity..."
          if grep -q 'integrity=' docs/index.html; then
            echo "PASS: SRI hashes found on external resources"
          else
            echo "WARN: No SRI hashes found"
          fi

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          SECRETS=$(grep -rn 'password\|secret\|api_key\|api-key\|token\|credential' \
            --include='*.js' --include='*.html' --include='*.yml' --include='*.json' \
            --exclude-dir=.git --exclude-dir=node_modules \
            docs/ .github/ 2>/dev/null | \
            grep -vi 'license\|creativecommons\|attribution\|security.md\|readme\|example\|placeholder\|securitytxt\|@import\|schema' || true)
          if [ -n "$SECRETS" ]; then
            echo "WARN: Potential secrets found:"
            echo "$SECRETS"
          else
            echo "PASS: No obvious secrets detected"
          fi

  sri-integrity:
    name: SRI Hash Validation (jsDelivr API)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate SRI using jsDelivr public API
        run: |
          echo "Validating Subresource Integrity hashes using jsDelivr API..."
          echo "The jsDelivr API (data.jsdelivr.com) provides SRI hashes for npm packages."
          echo ""

          # Check MathJax CDN SRI
          echo "1. MathJax (cdn.jsdelivr.net/npm/mathjax@3/...) - SRI present:"
          grep -c 'integrity=' docs/index.html && echo "   PASS" || echo "   WARN: No SRI found"
          
          # Use jsDelivr API to get official SRI hash for MathJax
          echo ""
          echo "2. Fetching official SRI hash from jsDelivr API..."
          SRI_RESPONSE=$(curl -s "https://data.jsdelivr.com/v1/packages/npm/mathjax/resolved" || echo "API unavailable")
          if [ -n "$SRI_RESPONSE" ] && echo "$SRI_RESPONSE" | jq -e . > /dev/null 2>&1; then
            echo "   jsDelivr API: OK"
            echo "   Package: mathjax"
            VERSION=$(echo "$SRI_RESPONSE" | jq -r '.version // "unknown"')
            echo "   Resolved version: $VERSION"
          else
            echo "   jsDelivr API: unavailable (non-blocking)"
          fi

      - name: Verify SRI hash freshness
        run: |
          echo "Checking that CDN versions are up-to-date..."
          # Check MathJax version referenced
          MATHJAX_VERSION=$(grep -oP 'mathjax@\K[0-9]+\.[0-9]+\.[0-9]+' docs/index.html || echo "not found")
          echo "MathJax version in use: $MATHJAX_VERSION"

  url-integrity:
    name: External URL Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract and verify external URLs
        run: |
          echo "Checking external URLs in documentation..."
          URLS=$(grep -oP 'https?://[^"'"'"' >]+' docs/index.html | \
            grep -v 'sufiyan-sabeel.github.io' | \
            sort -u || true)
          
          FAILED=0
          for url in $URLS; do
            echo "$url" | grep -q 'fonts.googleapis\|fonts.gstatic\|MathJax\|w3.org/schema\|creativecommons.org\|schema.org' && continue
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "FAIL")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "403" ]; then
              echo "OK: $url -> $STATUS"
            else
              echo "ISSUE: $url -> $STATUS"
              FAILED=$((FAILED + 1))
            fi
          done
          
          echo ""
          echo "URL check complete. Failures: $FAILED"
          if [ "$FAILED" -gt 0 ]; then
            echo "WARN: Some URLs may be unreachable"
          fi

  github-api-security:
    name: GitHub API Security Config Check
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Check repository security settings via GitHub API
        run: |
          echo "Checking repository security configuration..."
          
          # Use GitHub API to check branch protection
          if [ -n "$GITHUB_TOKEN" ]; then
            REPO="${{ github.repository }}"
            
            # Check if CodeQL is configured
            echo ""
            echo "1. CodeQL: Enabled via .github/workflows/codeql-analysis.yml"
            test -f .github/workflows/codeql-analysis.yml && echo "   PASS" || echo "   FAIL"
            
            # Check Dependabot
            echo ""
            echo "2. Dependabot: Enabled via .github/dependabot.yml"
            test -f .github/dependabot.yml && echo "   PASS" || echo "   FAIL"
            
            # Check SECURITY.md
            echo ""
            echo "3. SECURITY.md: Present"
            test -f SECURITY.md && echo "   PASS" || echo "   FAIL"
            
            # Check security.txt standard
            echo ""
            echo "4. security.txt: Present"
            test -f docs/.well-known/security.txt && echo "   PASS" || echo "   FAIL (non-blocking)"
            
            # Check license
            echo ""
            echo "5. LICENSE file: Present"
            test -f LICENSE && echo "   PASS" || echo "   FAIL"
          else
            echo "GitHub token not available — skipping API-specific checks"
          fi
